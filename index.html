<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecraft Helden Ultimate</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0d1117;
  color: #e6edf3;
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.login-card {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 12px;
  padding: 48px 40px;
  width: 480px;
  max-width: 90vw;
  text-align: center;
}
.login-icon { font-size: 48px; margin-bottom: 8px; }
h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
.subtitle { color: #8b949e; font-size: 14px; margin-bottom: 32px; }
.input-group { margin-bottom: 20px; text-align: left; }
.input-group label { display: block; font-size: 13px; color: #8b949e; margin-bottom: 6px; }
.input-group input {
  width: 100%;
  background: #0d1117;
  border: 1px solid #30363d;
  border-radius: 6px;
  color: #e6edf3;
  padding: 12px 16px;
  font-family: 'Courier New', monospace;
  font-size: 14px;
  letter-spacing: 1px;
}
.input-group input:focus { border-color: #58a6ff; outline: none; }
.error-msg { color: #f85149; font-size: 13px; margin-top: 8px; display: none; }
.btn {
  background: #58a6ff;
  color: #fff;
  border: none;
  border-radius: 6px;
  padding: 12px 24px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  width: 100%;
}
.btn:hover { background: #79c0ff; }
.login-footer { margin-top: 32px; padding-top: 24px; border-top: 1px solid #30363d; }
.login-footer p { color: #8b949e; font-size: 13px; margin-bottom: 8px; }
.login-footer a { color: #58a6ff; text-decoration: none; }
.login-footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="login-card">
  <div class="login-icon">⚔</div>
  <h1>Minecraft Helden Ultimate</h1>
  <p class="subtitle">Dashboard</p>
  <div class="input-group">
    <label for="key">Code eingeben</label>
    <input type="text" id="key" placeholder="Dein 64-stelliger Code" maxlength="64" autocomplete="off">
    <div id="error" class="error-msg"></div>
  </div>
  <button class="btn" onclick="login()">→ Dashboard anzeigen</button>
  <div class="login-footer">
    <p>Noch kein Code? Kaufe Premium auf unserem Discord</p>
    <a href="https://discord.gg/pxSJynZC6X" target="_blank">discord.gg/pxSJynZC6X</a>
  </div>
</div>
<script>
document.getElementById('key').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

async function login() {
  const key = document.getElementById('key').value.trim();
  const err = document.getElementById('error');
  if (!/^[0-9a-f]{64}$/i.test(key)) {
    err.textContent = 'Ungültiger Code (64 Hex-Zeichen)';
    err.style.display = 'block';
    return;
  }
  err.style.display = 'none';

  try {
    const r = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ key })
    });
    const data = await r.json();
    if (data.status === 'ok') {
      sessionStorage.setItem('dash_key', key);
      sessionStorage.setItem('dash_server', JSON.stringify(data.server));
      window.location.href = '/dashboard';
    } else {
      err.textContent = 'Code nicht gefunden. Hast du Premium? discord.gg/pxSJynZC6X';
      err.style.display = 'block';
    }
  } catch (e) {
    err.textContent = 'Verbindungsfehler';
    err.style.display = 'block';
  }
}
</script>
</body>
</html>
